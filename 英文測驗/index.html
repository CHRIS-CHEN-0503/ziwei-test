<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文拼音 Phonics 教學</title>
    <style>
        :root[data-theme="light"] {
            --bg: #f7f8fa;
            --bg-elev: #ffffff;
            --bg-sidebar: #ffffff;
            --border: #e5e7eb;
            --border-strong: #cbd5e1;
            --text: #0f172a;
            --text-mute: #64748b;
            --text-soft: #94a3b8;
            --accent: #334155;
            --accent-hover: #1e293b;
            --primary: #475569;
            --primary-hover: #334155;
            --success: #16a34a;
            --error: #dc2626;
            --hl-bg: #f1f5f9;
        }
        :root[data-theme="dark"] {
            --bg: #0f172a;
            --bg-elev: #1e293b;
            --bg-sidebar: #1a2236;
            --border: #334155;
            --border-strong: #475569;
            --text: #e2e8f0;
            --text-mute: #94a3b8;
            --text-soft: #64748b;
            --accent: #cbd5e1;
            --accent-hover: #f1f5f9;
            --primary: #94a3b8;
            --primary-hover: #cbd5e1;
            --success: #22c55e;
            --error: #ef4444;
            --hl-bg: #243047;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
                         "Microsoft JhengHei", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.55;
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
        }

        /* Top bar */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 20;
            background: var(--bg-elev);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar h1 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .home-link, .icon-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .home-link:hover, .icon-btn:hover {
            background: var(--hl-bg);
            border-color: var(--border-strong);
        }
        .icon-btn { padding: 6px 10px; }
        .top-progress {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 140px;
        }
        .top-progress-bar {
            flex: 1;
            height: 6px;
            background: var(--border);
            border-radius: 6px;
            overflow: hidden;
            min-width: 80px;
        }
        .top-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            width: 0%;
            transition: width 0.4s;
        }
        .top-progress-label {
            font-size: 0.8rem;
            color: var(--text-mute);
            white-space: nowrap;
        }

        /* Layout */
        .app-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: calc(100vh - 50px);
        }
        .sidebar {
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            padding: 20px 12px;
            overflow-y: auto;
            max-height: calc(100vh - 50px);
            position: sticky;
            top: 50px;
        }
        .sidebar-title {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-soft);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin: 6px 4px 12px;
        }
        .main {
            padding: 28px 32px;
            max-width: 880px;
        }

        /* Sidebar items */
        .nav-chapter, .nav-lesson {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            text-align: left;
            background: transparent;
            border: none;
            color: var(--text);
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.92rem;
            transition: background 0.15s;
        }
        .nav-chapter:hover, .nav-lesson:hover { background: var(--hl-bg); }
        .nav-chapter.open, .nav-chapter.active { background: var(--hl-bg); font-weight: 600; }
        .nav-chapter.dashboard-btn { margin-bottom: 12px; border: 1px dashed var(--border); }
        .nav-chapter .ch-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            background: var(--bg);
            border: 1px solid var(--border);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-mute);
            flex-shrink: 0;
        }
        .nav-chapter .ch-title { flex: 1; }
        .nav-chapter .ch-progress {
            font-size: 0.75rem;
            color: var(--text-mute);
            white-space: nowrap;
        }
        .nav-lessons {
            display: flex;
            flex-direction: column;
            padding-left: 14px;
            border-left: 2px solid var(--border);
            margin: 4px 0 8px 18px;
        }
        .nav-lesson {
            font-size: 0.88rem;
            padding: 8px 12px;
            color: var(--text-mute);
        }
        .nav-lesson.active {
            background: var(--hl-bg);
            color: var(--text);
            font-weight: 600;
        }
        .nav-lesson .ipa {
            font-family: "SF Mono", Consolas, monospace;
            font-size: 0.78rem;
            color: var(--text-soft);
            margin-left: auto;
        }
        .nav-lesson.nav-quiz {
            color: var(--accent);
            font-weight: 600;
            border-top: 1px dashed var(--border);
            margin-top: 4px;
        }

        /* Main header */
        .main-header { margin-bottom: 28px; }
        .breadcrumb {
            font-size: 0.85rem;
            color: var(--text-mute);
            margin: 0 0 6px;
            font-weight: 500;
        }
        .main-header h1 {
            font-size: 1.8rem;
            margin: 0 0 8px;
            color: var(--text);
            font-weight: 600;
        }
        .main-header .subtitle {
            color: var(--text-mute);
            margin: 0;
            font-size: 1rem;
            line-height: 1.65;
        }
        .ipa-big {
            font-family: "SF Mono", Consolas, monospace;
            font-size: 1.3rem;
            color: var(--primary);
            margin-left: 8px;
        }
        .ipa-inline {
            font-family: "SF Mono", Consolas, monospace;
            color: var(--text-mute);
            font-size: 0.9rem;
        }

        /* Dashboard */
        .dash-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .dash-card {
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 16px;
        }
        .dash-card-head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .dash-num {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary);
            color: var(--bg-elev);
            font-weight: 600;
            font-size: 0.95rem;
        }
        .dash-card h3 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
        }
        .dash-intro {
            font-size: 0.88rem;
            color: var(--text-mute);
            margin: 0 0 14px;
            line-height: 1.55;
        }
        .dash-stats { margin-bottom: 14px; }
        .stat { margin-bottom: 10px; }
        .stat-label {
            font-size: 0.78rem;
            color: var(--text-mute);
            margin-bottom: 4px;
        }
        .stat-bar {
            height: 6px;
            background: var(--border);
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 3px;
        }
        .stat-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.4s;
        }
        .stat-val {
            font-size: 0.78rem;
            color: var(--text-soft);
            text-align: right;
        }

        /* Buttons */
        .primary-btn, .secondary-btn {
            font-family: inherit;
            font-size: 0.95rem;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            border: 1px solid transparent;
            transition: all 0.15s;
        }
        .primary-btn {
            background: var(--primary);
            color: var(--bg-elev);
            border-color: var(--primary);
        }
        .primary-btn:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
        }
        .secondary-btn {
            background: transparent;
            color: var(--text);
            border-color: var(--border-strong);
        }
        .secondary-btn:hover { background: var(--hl-bg); }

        /* Chapter lesson list */
        .lesson-list { display: flex; flex-direction: column; gap: 10px; }
        .lesson-card-row {
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            color: var(--text);
            transition: all 0.15s;
        }
        .lesson-card-row:hover {
            border-color: var(--border-strong);
            background: var(--hl-bg);
        }
        .lr-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 4px; }
        .lr-pattern { font-size: 0.85rem; color: var(--text-mute); }
        .lr-arrow { color: var(--text-soft); font-size: 1.3rem; }
        .quiz-cta {
            margin-top: 16px;
            background: var(--accent);
            color: var(--bg-elev);
            border: none;
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .quiz-cta:hover { background: var(--accent-hover); }

        /* Lesson content blocks */
        .rule-block, .tips-block, .examples-block, .pseudo-block, .contrast-block {
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 16px;
        }
        .rule-block h3, .tips-block h3, .examples-block h3,
        .pseudo-block h3, .contrast-block h3 {
            margin: 0 0 10px;
            font-size: 1rem;
            color: var(--text);
        }
        .rule-block p, .tips-block p, .pseudo-hint, .contrast-hint {
            margin: 0;
            color: var(--text-mute);
            line-height: 1.7;
            font-size: 0.95rem;
        }
        .pseudo-hint { margin-bottom: 12px; font-size: 0.88rem; }
        .contrast-hint { margin-top: 10px; font-style: italic; }

        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 8px;
        }
        .word-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 8px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.15s;
        }
        .word-btn:hover {
            background: var(--hl-bg);
            border-color: var(--primary);
            transform: translateY(-1px);
        }
        .word-btn:active { transform: translateY(1px); }
        .word-btn.pseudo {
            background: transparent;
            border-style: dashed;
            color: var(--text-mute);
            font-style: italic;
        }
        .word-btn.pseudo:hover { color: var(--text); border-color: var(--primary); }

        .contrast-pairs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 16px;
        }
        .pair {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pair .vs {
            color: var(--text-soft);
            font-size: 0.85rem;
        }

        .lesson-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        /* Quiz */
        .quiz-progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 6px;
            overflow: hidden;
            margin-top: 12px;
        }
        .quiz-progress-bar > div {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
        }
        .quiz-card {
            background: var(--bg-elev);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px 24px;
        }
        .quiz-prompt {
            font-size: 1.05rem;
            color: var(--text);
            margin: 0 0 18px;
            font-weight: 500;
        }
        .audio-cue { text-align: center; margin: 24px 0; }
        .audio-btn {
            background: var(--primary);
            color: var(--bg-elev);
            border: none;
            padding: 14px 24px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
        }
        .audio-btn.small {
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 16px;
            margin-left: 10px;
        }
        .word-display {
            font-family: "Georgia", serif;
            font-size: 2.4rem;
            text-align: center;
            margin: 20px 0;
            color: var(--text);
            font-weight: 500;
        }
        .word-display.fillblank { letter-spacing: 0.05em; }
        .quiz-hint {
            text-align: center;
            color: var(--text-mute);
            margin: 0 0 14px;
            font-size: 0.88rem;
        }
        .quiz-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }
        .opt-btn {
            padding: 14px 12px;
            border: 1px solid var(--border-strong);
            background: var(--bg);
            color: var(--text);
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.15s;
        }
        .opt-btn:hover:not(:disabled) {
            background: var(--hl-bg);
            border-color: var(--primary);
        }
        .opt-btn.correct {
            background: var(--success);
            border-color: var(--success);
            color: #fff;
        }
        .opt-btn.wrong {
            background: var(--error);
            border-color: var(--error);
            color: #fff;
        }
        .opt-btn:disabled { cursor: not-allowed; opacity: 0.85; }
        .quiz-feedback {
            margin-top: 16px;
            min-height: 1.6em;
            text-align: center;
            font-size: 0.95rem;
        }
        .fb.ok { color: var(--success); font-weight: 600; }
        .fb.bad { color: var(--error); font-weight: 600; }
        .fb-rule {
            display: block;
            margin-top: 6px;
            color: var(--text-mute);
            font-size: 0.85rem;
        }
        .quiz-meta {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-mute);
            font-size: 0.9rem;
        }

        /* Result */
        .wrong-list { display: flex; flex-direction: column; gap: 12px; }
        .wrong-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
        }
        .wrong-q { font-weight: 600; margin-bottom: 4px; }
        .wrong-meta { font-size: 0.88rem; color: var(--text-mute); margin-bottom: 6px; }
        .wrong-rule { font-size: 0.85rem; color: var(--text-mute); font-style: italic; }
        .ok { color: var(--success); font-weight: 600; }
        .bad { color: var(--error); font-weight: 600; }

        /* Mobile */
        #sidebar-toggle { display: none; }
        @media (max-width: 768px) {
            .app-layout {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: fixed;
                top: 50px;
                left: -100%;
                width: 280px;
                height: calc(100vh - 50px);
                z-index: 30;
                transition: left 0.2s;
            }
            body.sidebar-open .sidebar { left: 0; box-shadow: 4px 0 20px rgba(0,0,0,0.15); }
            #sidebar-toggle { display: inline-flex; }
            .main { padding: 20px 16px; }
            .main-header h1 { font-size: 1.45rem; }
            .quiz-options { grid-template-columns: 1fr; }
            .word-display { font-size: 1.8rem; }
            .topbar h1 { font-size: 0.95rem; }
            .top-progress-label { display: none; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <button class="icon-btn" id="sidebar-toggle" title="章節導覽">☰</button>
        <a class="home-link" href="../" title="回到學習樂園">🏠 首頁</a>
        <h1>英文拼音 Phonics 教學</h1>
        <div class="top-progress">
            <div class="top-progress-bar"><div class="top-progress-fill" id="top-progress-fill"></div></div>
            <span class="top-progress-label" id="top-progress-label">學習進度 0%</span>
        </div>
        <button class="icon-btn" id="theme-toggle" title="切換深淺色">🌙</button>
    </header>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-title">章節導覽</div>
            <nav id="sidebar-nav"></nav>
        </aside>
        <main class="main" id="main-content"></main>
    </div>

    <script src="curriculum.js"></script>
    <script src="app.js"></script>
</body>
</html>
